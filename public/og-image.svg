<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="ambientGlow" cx="30%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#090909" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="85%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#090909" stop-opacity="0"/>
    </radialGradient>

    <!-- Noise filter for film grain -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Clip for rounded border -->
    <clipPath id="roundedClip">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#090909"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#ambientGlow)"/>
  <rect width="1200" height="630" fill="url(#rightGlow)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>

  <!-- Top border accent line -->
  <rect x="80" y="0" width="160" height="2" fill="#F5A623" opacity="0.9"/>

  <!-- MP Monogram badge -->
  <rect x="80" y="80" width="64" height="64" rx="4" fill="none" stroke="#F5A623" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="112" y="121" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#F5A623" text-anchor="middle" letter-spacing="2">MP</text>

  <!-- Section label -->
  <text x="80" y="230" font-family="'Courier New', Courier, monospace" font-size="12" fill="#F5A623" letter-spacing="5" text-transform="uppercase" opacity="0.7">PORTFOLIO — 2025</text>

  <!-- Main name -->
  <text x="80" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" fill="#F5F5F0" letter-spacing="-1">Martin</text>
  <text x="80" y="412" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" fill="#F5F5F0" letter-spacing="-1">Petrov<tspan fill="#F5A623">.</tspan></text>

  <!-- Role subtitle -->
  <text x="80" y="468" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#6B6B6B" letter-spacing="1" font-weight="300">Frontend &amp; Full-Stack Developer</text>

  <!-- Divider line -->
  <rect x="80" y="500" width="520" height="1" fill="#ffffff" opacity="0.06"/>

  <!-- Tech stack tags -->
  <!-- React tag -->
  <rect x="80" y="520" width="74" height="28" rx="14" fill="none" stroke="#F5A623" stroke-width="1" stroke-opacity="0.35"/>
  <text x="117" y="539" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F5A623" text-anchor="middle" opacity="0.75">React</text>

  <!-- TypeScript tag -->
  <rect x="166" y="520" width="96" height="28" rx="14" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.12"/>
  <text x="214" y="539" font-family="'Courier New', Courier, monospace" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.4">TypeScript</text>

  <!-- Node.js tag -->
  <rect x="274" y="520" width="74" height="28" rx="14" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.12"/>
  <text x="311" y="539" font-family="'Courier New', Courier, monospace" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.4">Node.js</text>

  <!-- Three.js tag -->
  <rect x="360" y="520" width="72" height="28" rx="14" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.12"/>
  <text x="396" y="539" font-family="'Courier New', Courier, monospace" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.4">Three.js</text>

  <!-- Right side decorative element — orbital rings -->
  <circle cx="960" cy="315" r="180" fill="none" stroke="#F5A623" stroke-width="0.75" stroke-opacity="0.12" stroke-dasharray="4 8"/>
  <circle cx="960" cy="315" r="120" fill="none" stroke="#F5A623" stroke-width="0.75" stroke-opacity="0.18" stroke-dasharray="2 6"/>
  <circle cx="960" cy="315" r="60" fill="none" stroke="#F5A623" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Center of rings -->
  <circle cx="960" cy="315" r="30" fill="#111111" stroke="#F5A623" stroke-width="1" stroke-opacity="0.5"/>
  <text x="960" y="322" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="700" fill="#F5A623" text-anchor="middle" letter-spacing="1">MP</text>

  <!-- Orbiting dots -->
  <circle cx="960" cy="135" r="4" fill="#F5A623" opacity="0.7"/>
  <circle cx="1140" cy="315" r="3" fill="#F5A623" opacity="0.4"/>
  <circle cx="960" cy="495" r="3" fill="#F5A623" opacity="0.3"/>
  <circle cx="780" cy="315" r="4" fill="#F5A623" opacity="0.5"/>

  <!-- Particle dots scattered -->
  <circle cx="850" cy="160" r="1.5" fill="#F5A623" opacity="0.5"/>
  <circle cx="1080" cy="200" r="1" fill="#F5A623" opacity="0.35"/>
  <circle cx="720" cy="400" r="1.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="1100" cy="430" r="1" fill="#F5A623" opacity="0.3"/>
  <circle cx="890" cy="480" r="2" fill="#ffffff" opacity="0.15"/>
  <circle cx="700" cy="240" r="1" fill="#F5A623" opacity="0.25"/>
  <circle cx="1150" cy="120" r="1.5" fill="#ffffff" opacity="0.1"/>
  <circle cx="760" cy="520" r="1" fill="#F5A623" opacity="0.3"/>

  <!-- Available badge -->
  <rect x="820" y="550" width="140" height="32" rx="16" fill="#111111" stroke="#F5A623" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="845" cy="566" r="4" fill="#4ADE80" opacity="0.9"/>
  <text x="895" y="572" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F5F5F0" text-anchor="middle" opacity="0.7" letter-spacing="1">Available</text>

  <!-- URL / Domain -->
  <text x="80" y="600" font-family="'Courier New', Courier, monospace" font-size="12" fill="#2A2A2A" letter-spacing="3">martinpetrov.dev</text>

  <!-- Film grain overlay -->
  <rect width="1200" height="630" fill="transparent" filter="url(#grain)" opacity="0.04"/>
</svg>
